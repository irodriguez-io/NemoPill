# NemoPill — GitHub Actions CI
# Eight merge-blocking stages per ADR-044 and _context/12_environments_and_devops.md
#
# Stages (T-007 scope):
#   1. setup                         — Validate environment; restore Gradle cache
#   2. lint                          — Android Lint + ktlint style check
#   3. secret-scan                   — gitleaks full-tree scan
#   4. framework-validate            — _context/ placeholder resolution check
#   5. arch-conformance              — Konsist architecture rules
#   6. build                         — Assemble debug APK
#   7. unit-integration-ui-snapshot  — Full cross-module test run (Robolectric + Konsist)
#   8. coverage                      — Kover threshold gate + HTML report upload
#
# Branch protection: all eight jobs listed as required status checks on main.
# Human gatekeeper must add unit-integration-ui-snapshot and coverage at T-007 close.
#
# T-006 fix-up: added android-actions/setup-android@v3 to lint, arch-conformance,
# and build jobs; lint now runs both `lint` (Android Lint) and `ktlintCheck`.

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel in-progress runs for the same PR to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Gradle project lives one level below the repo root.
  GRADLE_DIR: _source
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin"

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 — Setup
# Validates that the Gradle wrapper checksum is not tampered with and primes
# the Gradle build cache for all downstream jobs.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  setup:
    name: "1 · Setup"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          build-scan-publish: false
          cache-read-only: false

      # Supply-chain check: verify the committed gradle-wrapper.jar against a
      # pinned, known-good SHA-256 rather than gradle/actions/wrapper-validation@v3,
      # whose live checksum-registry lookup proved flaky on the runner
      # (intermittent ETIMEDOUT to Cloudflare). This is offline and deterministic.
      #
      # ⚠️  WHEN UPGRADING GRADLE: this hash is specific to the wrapper JAR for the
      #     version pinned in _source/gradle/wrapper/gradle-wrapper.properties
      #     (currently 8.10.2). After changing the Gradle version you MUST update
      #     the hash below to the new version's official wrapper checksum, or this
      #     step will fail. Get it from https://gradle.org/release-checksums/
      #     (the "Wrapper JAR" SHA-256 for the target version), or locally:
      #       shasum -a 256 _source/gradle/wrapper/gradle-wrapper.jar
      - name: Validate Gradle Wrapper checksum (pinned for Gradle 8.10.2)
        working-directory: ${{ env.GRADLE_DIR }}
        run: |
          echo "2db75c40782f5e8ba1fc278a5574bab070adccb2d21ca5a6e5ed840888448046  gradle/wrapper/gradle-wrapper.jar" | sha256sum -c -

      # Warm the configuration cache and dependency cache for downstream jobs.
      - name: Prime Gradle cache
        working-directory: ${{ env.GRADLE_DIR }}
        run: ./gradlew help --configuration-cache

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — Lint (ktlint)
# ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: "2 · Lint"
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Set up Android SDK (compileSdk 35)
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Android Lint + ktlint check
        working-directory: ${{ env.GRADLE_DIR }}
        run: ./gradlew lint ktlintCheck --continue

      - name: Upload lint and ktlint reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            ${{ env.GRADLE_DIR }}/**/build/reports/lint-results*.html
            ${{ env.GRADLE_DIR }}/**/build/reports/ktlint/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3 — Secret scan (gitleaks)
# Scans the entire commit tree. Any leaked credential fails the build.
# ─────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: "3 · Secret Scan"
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout (full history for gitleaks)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

# ─────────────────────────────────────────────────────────────────────────────
# Stage 4 — Framework validation
# Ensures _context/ has no unresolved {{REQUIRED:}} / {{OPTIONAL:}} / {{EXAMPLE:}}
# placeholders before any code-level checks run.
# ─────────────────────────────────────────────────────────────────────────────
  framework-validate:
    name: "4 · Framework Validate"
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate _context/ framework files
        run: bash _framework/validate_framework.sh

# ─────────────────────────────────────────────────────────────────────────────
# Stage 5 — Architecture conformance (Konsist)
# Runs the six Konsist rules defined in :core test source set.
# INTERNET-permission allowlist rule fires first (THR-016 priority).
# ─────────────────────────────────────────────────────────────────────────────
  arch-conformance:
    name: "5 · Architecture Conformance"
    runs-on: ubuntu-latest
    needs: [ lint, framework-validate ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Set up Android SDK (compileSdk 35)
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Run Konsist architecture tests
        working-directory: ${{ env.GRADLE_DIR }}
        run: ./gradlew :core:test --tests "io.nemopill.core.konsist.*"

      - name: Upload Konsist test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: konsist-reports
          path: ${{ env.GRADLE_DIR }}/core/build/reports/tests/test/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Stage 6 — Build (debug APK)
# Assembles the debug build to confirm the project compiles end-to-end.
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: "6 · Build"
    runs-on: ubuntu-latest
    needs: [ secret-scan, arch-conformance ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Set up Android SDK (compileSdk 35)
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Assemble debug APK
        working-directory: ${{ env.GRADLE_DIR }}
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nemopill-debug-apk
          path: ${{ env.GRADLE_DIR }}/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

# ─────────────────────────────────────────────────────────────────────────────
# Stage 7 — Unit / Integration / UI snapshot (T-007)
# Full cross-module test run: Konsist assertions run again as part of the full
# suite (two independent CI signals). Robolectric smoke-test and Roborazzi
# import-resolution smoke-test also run here (AC-002, AC-003, AC-004).
# ─────────────────────────────────────────────────────────────────────────────
  unit-integration-ui-snapshot:
    name: "7 · Unit / Integration / UI"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Set up Android SDK (compileSdk 35)
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Run full test suite
        working-directory: ${{ env.GRADLE_DIR }}
        run: ./gradlew test

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: ${{ env.GRADLE_DIR }}/**/build/reports/tests/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Stage 8 — Coverage (Kover) (T-007)
# Runs koverVerify (per-module thresholds) and koverHtmlReport (aggregate report).
# Report is uploaded unconditionally so it is available on every PR regardless
# of pass/fail. Satisfies M-001 Done When item (4).
# ─────────────────────────────────────────────────────────────────────────────
  coverage:
    name: "8 · Coverage"
    runs-on: ubuntu-latest
    needs: unit-integration-ui-snapshot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Set up Android SDK (compileSdk 35)
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Verify coverage thresholds and generate HTML report
        working-directory: ${{ env.GRADLE_DIR }}
        run: ./gradlew koverVerify koverHtmlReport

      - name: Upload Kover HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-report
          path: ${{ env.GRADLE_DIR }}/**/build/reports/kover/
          retention-days: 14
